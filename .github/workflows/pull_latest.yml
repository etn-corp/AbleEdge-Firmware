# Pull Latest Release Files from Private Repository

name: Pull Latest Release Files

on:
  # Triggered by the source repo when a new release is published (Stage 2)
  repository_dispatch:
    types: [firmware-release]

  # Manual trigger from the Actions tab
  workflow_dispatch:

  # Fallback daily poll — can be removed once repository_dispatch is in place (Stage 2)
  schedule:
    - cron: '0 2 * * *'

# Ensure only one instance runs at a time
concurrency:
  group: pull-latest-release
  cancel-in-progress: true

jobs:
  pull-latest-files:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required to commit files and create releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Fetch latest release from source repo
        id: fetch-release
        run: |
          SOURCE_REPO="etn-electrical/Smart-Breaker-2.0-Build-Releases"
          echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
          echo "Fetching latest release from $SOURCE_REPO..."

          RELEASE_JSON=$(curl -s \
            -H "Authorization: token ${{ secrets.SOURCE_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$SOURCE_REPO/releases/latest")

          # Validate we received a real release
          if echo "$RELEASE_JSON" | jq -e '.message' > /dev/null 2>&1; then
            echo "ERROR: $(echo "$RELEASE_JSON" | jq -r '.message')"
            exit 1
          fi

          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          RELEASE_NAME=$(echo "$RELEASE_JSON" | jq -r '.name')

          # Strip leading 'v' from tag to get the folder name (e.g. v3.1.2 -> 3.1.2)
          VERSION=${TAG#v}

          echo "Latest release tag: $TAG  (folder: $VERSION) — $RELEASE_NAME"
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          echo "LATEST_VERSION=$VERSION" >> $GITHUB_ENV
          echo "latest_version=$VERSION" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV

          # Capture upstream release body (used in release notes below)
          RELEASE_BODY=$(echo "$RELEASE_JSON" | jq -r '.body // ""')
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "UPSTREAM_RELEASE_BODY<<$EOF" >> $GITHUB_ENV
          echo "$RELEASE_BODY" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: Download files from source repo at release tag
        run: |
          mkdir -p "$LATEST_VERSION"
          echo "Fetching file list from $SOURCE_REPO at tag $RELEASE_TAG (folder: $LATEST_VERSION)..."

          # List files in the versioned directory at the release tag ref
          FILES_JSON=$(curl -s \
            -H "Authorization: token ${{ secrets.SOURCE_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$SOURCE_REPO/contents/$LATEST_VERSION?ref=$RELEASE_TAG")

          # Validate response is an array
          if ! echo "$FILES_JSON" | jq -e 'type == "array"' > /dev/null 2>&1; then
            echo "ERROR: Could not list directory $LATEST_VERSION at ref $RELEASE_TAG"
            echo "API response: $(echo "$FILES_JSON" | jq -r '.message // .')"
            exit 1
          fi

          COUNT=$(echo "$FILES_JSON" | jq 'length')
          echo "Found $COUNT file(s) in $LATEST_VERSION/ at $RELEASE_TAG"

          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: No files found in $LATEST_VERSION/ at ref $RELEASE_TAG"
            exit 1
          fi

          # Download every file in the directory
          echo "$FILES_JSON" | jq -c '.[] | select(.type == "file")' | while read -r file; do
            NAME=$(echo "$file" | jq -r '.name')
            DOWNLOAD_URL=$(echo "$file" | jq -r '.download_url')
            echo "Downloading $NAME..."
            curl -s -L \
              -H "Authorization: token ${{ secrets.SOURCE_REPO_TOKEN }}" \
              "$DOWNLOAD_URL" -o "$LATEST_VERSION/$NAME"
            if [ $? -ne 0 ]; then
              echo "ERROR: Failed to download $NAME"
              exit 1
            fi
          done

          echo ""
          echo "Files in $LATEST_VERSION/:"
          ls -lh "$LATEST_VERSION/"

      - name: Check for changes
        id: check-changes
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if ! git diff-index --quiet HEAD --; then
            echo "Changes detected — new assets for version $LATEST_VERSION"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No changes detected — version $LATEST_VERSION is already up to date"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "chore: pull release assets for version $LATEST_VERSION

          - Source: $SOURCE_REPO
          - Version: $LATEST_VERSION
          - Automated pull via GitHub Actions"
          git push

      - name: Check if GitHub Release already exists
        id: check-release
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$LATEST_VERSION")

          if echo "$RESPONSE" | jq -e '.id' > /dev/null 2>&1; then
            echo "Release $LATEST_VERSION already exists — skipping"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Release $LATEST_VERSION does not exist — will create"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.check-release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.LATEST_VERSION }}
          name: "Smart Breaker 2.0 Firmware — ${{ env.LATEST_VERSION }}"
          body: |
            ## Smart Breaker 2.0 Firmware — Version ${{ env.LATEST_VERSION }}

            See the included **Release Notes PDF** for full change history and hardware compatibility details.

            ${{ env.UPSTREAM_RELEASE_BODY }}

            ---
            *Pulled from [`${{ env.SOURCE_REPO }}`](https://github.com/${{ env.SOURCE_REPO }}/releases/tag/${{ env.RELEASE_TAG }})*
          files: ${{ env.LATEST_VERSION }}/*
          make_latest: "true"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Source Repo** | \`$SOURCE_REPO\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`$LATEST_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Assets** | $(ls "$LATEST_VERSION/" 2>/dev/null | wc -l | tr -d ' ') files |" >> $GITHUB_STEP_SUMMARY
          echo "| **Committed** | ${{ steps.check-changes.outputs.has_changes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Release Created** | ${{ steps.check-release.outputs.exists == 'false' }} |" >> $GITHUB_STEP_SUMMARY
