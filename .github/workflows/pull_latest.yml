# Pull Latest Release Files from Private Repository
#
name: Pull Latest Release Files

on:
  # Triggered automatically by the source repo when a new release is published
  repository_dispatch:
    types: [firmware-release]

  # Manual trigger from the Actions tab for testing
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to pull (e.g. v3.1.3). Leave blank to use latest.'
        required: false
        default: ''

# Ensure only one instance runs at a time
concurrency:
  group: pull-latest-release
  cancel-in-progress: true

jobs:
  pull-latest-files:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required to create GitHub Releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag and metadata
        id: fetch-release
        run: |
          SOURCE_REPO="etn-electrical/Smart-Breaker-2.0-Build-Releases"
          echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV

          # Prefer tag from dispatch payload, then manual input, then fall back to latest
          DISPATCHED_TAG="${{ github.event.client_payload.tag }}"
          MANUAL_TAG="${{ github.event.inputs.tag }}"

          if [ -n "$DISPATCHED_TAG" ]; then
            TAG="$DISPATCHED_TAG"
            echo "Using tag from repository_dispatch payload: $TAG"
          elif [ -n "$MANUAL_TAG" ]; then
            TAG="$MANUAL_TAG"
            echo "Using tag from workflow_dispatch input: $TAG"
          else
            echo "No tag provided — fetching latest release..."
            LATEST_JSON=$(curl -s \
              -H "Authorization: token ${{ secrets.SOURCE_REPO_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$SOURCE_REPO/releases/latest")
            TAG=$(echo "$LATEST_JSON" | jq -r '.tag_name')
            echo "Resolved latest tag: $TAG"
          fi

          # Fetch full release metadata for the resolved tag
          RELEASE_JSON=$(curl -s \
            -H "Authorization: token ${{ secrets.SOURCE_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$SOURCE_REPO/releases/tags/$TAG")

          if echo "$RELEASE_JSON" | jq -e '.message' > /dev/null 2>&1; then
            echo "ERROR: $(echo "$RELEASE_JSON" | jq -r '.message')"
            exit 1
          fi

          RELEASE_NAME=$(echo "$RELEASE_JSON" | jq -r '.name')

          # Strip leading 'v' from tag to get the folder name (e.g. v3.1.3 -> 3.1.3)
          VERSION=${TAG#v}

          echo "Release tag: $TAG  (folder: $VERSION) — $RELEASE_NAME"
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          echo "LATEST_VERSION=$VERSION" >> $GITHUB_ENV
          echo "latest_version=$VERSION" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV

          # Capture upstream release body for use in release notes
          RELEASE_BODY=$(echo "$RELEASE_JSON" | jq -r '.body // ""')
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "UPSTREAM_RELEASE_BODY<<$EOF" >> $GITHUB_ENV
          echo "$RELEASE_BODY" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: Download version folder from source repo as zip
        run: |
          echo "Downloading $LATEST_VERSION/ from $SOURCE_REPO at $RELEASE_TAG via tarball API..."

          # Use the tarball API to download the full repo at the release tag, then extract only
          # the versioned folder. This correctly captures all subdirectories
          # (ADU_Test_Builds/, Protection Build/, etc.) rather than only top-level files.
          mkdir -p /tmp/source-tarball
          curl -s -L \
            -H "Authorization: token ${{ secrets.SOURCE_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$SOURCE_REPO/tarball/$RELEASE_TAG" \
            -o /tmp/source-tarball/repo.tar.gz

          if [ ! -s /tmp/source-tarball/repo.tar.gz ]; then
            echo "ERROR: Tarball download failed or is empty"
            exit 1
          fi

          echo "Tarball size: $(du -h /tmp/source-tarball/repo.tar.gz | cut -f1)"

          # Extract — GitHub wraps contents in a root dir like etn-electrical-Smart-Breaker-<sha>/
          tar -xzf /tmp/source-tarball/repo.tar.gz -C /tmp/source-tarball
          EXTRACTED_ROOT=$(find /tmp/source-tarball -mindepth 1 -maxdepth 1 -type d | head -1)
          echo "Extracted root: $EXTRACTED_ROOT"

          # Verify the version folder exists
          VERSION_DIR="$EXTRACTED_ROOT/$LATEST_VERSION"
          if [ ! -d "$VERSION_DIR" ]; then
            echo "ERROR: Folder $LATEST_VERSION not found in source repo at tag $RELEASE_TAG"
            echo "Available top-level dirs:"
            ls "$EXTRACTED_ROOT/"
            exit 1
          fi

          echo "Contents of $LATEST_VERSION/ in source repo:"
          find "$VERSION_DIR" -type f | sort

          # Zip the version folder to preserve subdirectory structure for the release asset
          ZIP_NAME="Smart-Breaker-2.0-Firmware-${LATEST_VERSION}.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

          cd "$EXTRACTED_ROOT"
          zip -r "/tmp/$ZIP_NAME" "$LATEST_VERSION/"
          echo "Zip size: $(du -h /tmp/$ZIP_NAME | cut -f1)"

          echo "ZIP_PATH=/tmp/$ZIP_NAME" >> $GITHUB_ENV
          echo "Release asset ready at: /tmp/$ZIP_NAME"

      - name: Check if GitHub Release already exists
        id: check-release
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$LATEST_VERSION")

          if echo "$RESPONSE" | jq -e '.id' > /dev/null 2>&1; then
            echo "Release $LATEST_VERSION already exists — skipping"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Release $LATEST_VERSION does not exist — will create"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.check-release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.LATEST_VERSION }}
          name: "Smart Breaker 2.0 Firmware — ${{ env.LATEST_VERSION }}"
          body: |
            ## Smart Breaker 2.0 Firmware — Version ${{ env.LATEST_VERSION }}

            See the included **Release Notes PDF** for full change history and hardware compatibility details.

            ${{ env.UPSTREAM_RELEASE_BODY }}

            ---
            *Pulled from [`${{ env.SOURCE_REPO }}`](https://github.com/${{ env.SOURCE_REPO }}/releases/tag/${{ env.RELEASE_TAG }})*
          files: ${{ env.ZIP_PATH }}
          make_latest: "true"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Source Repo** | \`$SOURCE_REPO\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`$LATEST_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Zip Asset** | \`$ZIP_NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Release Created** | ${{ steps.check-release.outputs.exists == 'false' }} |" >> $GITHUB_STEP_SUMMARY
